

services:
  db:
    image: postgres:15-alpine
    container_name: ${NEXT_PUBLIC_APP_NAME}_db
    restart: always
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${NEXT_PUBLIC_APP_NAME}_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${NEXT_PUBLIC_APP_NAME}_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ${NEXT_PUBLIC_APP_NAME}_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      
volumes:
  db_data: